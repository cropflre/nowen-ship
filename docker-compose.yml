services:
  postgres:
    image: postgres:16-alpine
    container_name: nowen-ship-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nowen
      POSTGRES_PASSWORD: nowen_local_dev
      POSTGRES_DB: nowen_release_hub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nowen -d nowen_release_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: nowen-ship-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://nowen:nowen_local_dev@postgres:5432/nowen_release_hub
      GITHUB_TOKEN: ${GITHUB_TOKEN:-not-configured}
      GITHUB_TOKEN_TYPE: ${GITHUB_TOKEN_TYPE:-pat}
      API_TOKEN: ${API_TOKEN:-nowen-local-dev-token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nowen-ship-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  pgdata:
