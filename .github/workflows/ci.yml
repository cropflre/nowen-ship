name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lockfile:
    name: Generate missing pnpm lockfile
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Generate lockfile when missing
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml already exists"
            exit 0
          fi

          pnpm install --lockfile-only
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: generate pnpm lockfile [skip ci]"
          git push origin HEAD:main

  checks:
    name: Typecheck, lint, test and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nowen
          POSTGRES_PASSWORD: nowen_local_dev
          POSTGRES_DB: nowen_release_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nowen -d nowen_release_hub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      HOST: 127.0.0.1
      PORT: 3001
      DATABASE_URL: postgresql://nowen:nowen_local_dev@127.0.0.1:5432/nowen_release_hub
      GITHUB_TOKEN: ${{ github.token }}
      API_TOKEN: ci-placeholder
      LOG_LEVEL: error
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm db:migrate:deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: API readiness smoke test
        run: |
          pnpm --filter nowen-release-hub-server start >/tmp/nowen-ship-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3001/api/health/ready; then
              exit 0
            fi
            sleep 2
          done

          cat /tmp/nowen-ship-server.log
          exit 1

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server image
        run: docker build --file apps/server/Dockerfile --tag nowen-ship-server:ci .

      - name: Build web image
        run: docker build --file apps/web/Dockerfile --tag nowen-ship-web:ci .

  report:
    name: Update SHIP-BASE-01 status
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [checks, docker]
    permissions:
      issues: write
    steps:
      - name: Update issue comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ship-base-ci -->';
            const checks = '${{ needs.checks.result }}';
            const docker = '${{ needs.docker.result }}';
            const icon = (result) => result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : '❌';
            const body = `${marker}\n## SHIP-BASE-01 CI 状态\n\n- ${icon(checks)} 工程检查：**${checks}**\n- ${icon(docker)} Docker 镜像：**${docker}**\n- Commit：\`${context.sha}\`\n- [查看 Actions 运行](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n> 此评论由 CI 自动更新。`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 1,
                body,
              });
            }
